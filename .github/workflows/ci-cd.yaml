# Maestro Healthcare Platform - CI/CD Pipeline
# GitHub Actions workflow for build, test, and deploy

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================================================
  # LINT AND STATIC ANALYSIS
  # ==========================================================================
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit safety

      - name: Run Ruff linter
        run: ruff check healthcare_platform/

      - name: Run Ruff formatter check
        run: ruff format --check healthcare_platform/

      - name: Run MyPy type checking
        run: mypy healthcare_platform/ --ignore-missing-imports

      - name: Run Bandit security scan
        run: bandit -r healthcare_platform/ -ll -ii

      - name: Check for PII in process variables
        run: |
          # Custom check for LGPD compliance - no PII in BPMN variables
          if grep -r "cpf\|email\|telefone\|endereco" healthcare_platform/**/bpmn/*.bpmn 2>/dev/null; then
            echo "::error::PII detected in BPMN process variables! Use FHIR references only."
            exit 1
          fi

  # ==========================================================================
  # UNIT TESTS
  # ==========================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=healthcare_platform \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=test-results.xml \
            -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            htmlcov/

  # ==========================================================================
  # DMN VALIDATION
  # ==========================================================================
  validate-dmn:
    name: Validate DMN Rules
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install DMN validator
        run: pip install dmn-check feel-parser

      - name: Validate DMN syntax
        run: |
          find healthcare_platform -name "*.dmn" -type f | while read dmn; do
            echo "Validating: $dmn"
            python -c "from xml.etree import ElementTree; ElementTree.parse('$dmn')" || exit 1
          done

      - name: Generate DMN inventory
        run: |
          echo "# DMN Inventory - $(date)" > dmn-inventory.md
          echo "" >> dmn-inventory.md
          find healthcare_platform -name "*.dmn" -type f | wc -l | xargs -I {} echo "Total DMN files: {}" >> dmn-inventory.md
          echo "" >> dmn-inventory.md
          find healthcare_platform -name "*.dmn" -type f | sort >> dmn-inventory.md

      - name: Upload DMN inventory
        uses: actions/upload-artifact@v4
        with:
          name: dmn-inventory
          path: dmn-inventory.md

  # ==========================================================================
  # BPMN VALIDATION
  # ==========================================================================
  validate-bpmn:
    name: Validate BPMN Processes
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Validate BPMN XML syntax
        run: |
          find healthcare_platform -name "*.bpmn" -type f | while read bpmn; do
            echo "Validating: $bpmn"
            python3 -c "from xml.etree import ElementTree; ElementTree.parse('$bpmn')" || exit 1
          done

      - name: Check for Zeebe references (should be none after Wave 3)
        run: |
          if grep -r "zeebe:" healthcare_platform/**/bpmn/*.bpmn 2>/dev/null; then
            echo "::error::Zeebe namespace found in BPMN! Should use camunda: namespace."
            exit 1
          fi

      - name: Generate BPMN inventory
        run: |
          echo "# BPMN Inventory - $(date)" > bpmn-inventory.md
          echo "" >> bpmn-inventory.md
          find healthcare_platform -name "*.bpmn" -type f | wc -l | xargs -I {} echo "Total BPMN files: {}" >> bpmn-inventory.md

      - name: Upload BPMN inventory
        uses: actions/upload-artifact@v4
        with:
          name: bpmn-inventory
          path: bpmn-inventory.md

  # ==========================================================================
  # BUILD DOCKER IMAGES
  # ==========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, validate-dmn, validate-bpmn]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component:
          - name: workers
            dockerfile: Dockerfile
            context: .
          - name: cdc-bridge
            dockerfile: Dockerfile.cdc-bridge
            context: .
          - name: webhook-receiver
            dockerfile: Dockerfile.webhook-receiver
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

  # ==========================================================================
  # DEPLOY TO ENVIRONMENT
  # ==========================================================================
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: https://bpm.${{ github.event.inputs.environment || 'dev' }}.austa.com.br
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name maestro-${{ github.event.inputs.environment || 'dev' }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Deploy with Helm
        run: |
          helm upgrade --install maestro ./helm/maestro \
            --namespace maestro \
            --create-namespace \
            --values ./helm/maestro/values.yaml \
            --values ./helm/maestro/values-${{ github.event.inputs.environment || 'dev' }}.yaml \
            --set global.environment=${{ github.event.inputs.environment || 'dev' }} \
            --set workers.image.tag=${{ github.sha }} \
            --set cdcBridge.image.tag=${{ github.sha }} \
            --set webhookReceiver.image.tag=${{ github.sha }} \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl -n maestro rollout status deployment/maestro-cib-seven --timeout=5m
          kubectl -n maestro rollout status deployment/maestro-worker-revenue-cycle --timeout=5m
          kubectl -n maestro get pods

      - name: Deploy BPMN/DMN to CIB Seven
        run: |
          # Get CIB Seven pod
          POD=$(kubectl -n maestro get pods -l app.kubernetes.io/component=bpm-engine -o jsonpath='{.items[0].metadata.name}')
          
          # Copy deployments
          kubectl -n maestro cp healthcare_platform/revenue_cycle/bpmn/ $POD:/camunda/deployments/revenue_cycle/
          kubectl -n maestro cp healthcare_platform/revenue_cycle/dmn/ $POD:/camunda/deployments/revenue_cycle/
          
          echo "BPMN/DMN deployed to CIB Seven"

  # ==========================================================================
  # INTEGRATION TESTS (Post-deploy)
  # ==========================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: pip install -e ".[test]" requests

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            --junitxml=integration-results.xml \
            -v \
            -m "not slow"
        env:
          CAMUNDA_BASE_URL: https://bpm.staging.austa.com.br/engine-rest
          FHIR_BASE_URL: https://fhir.staging.austa.com.br/fhir

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: integration-results.xml
