##############################################################################
# Maestro Healthcare Platform - Test Environment
# Usage: docker compose -f docker-compose.test.yml up -d
# Purpose: Isolated test environment for CI/CD and local testing
# Requires: Docker Desktop with 4GB+ RAM allocated
#
# Profiles:
#   (none)      — postgres-test + cib7-engine-test only (BPMN integration tests)
#   full        — entire stack (postgres, cib7, redis, kafka, hapi-fhir, keycloak)
#   messaging   — adds redis-test + kafka-test
#   fhir        — adds hapi-fhir-test
#   auth        — adds keycloak-test
#
# Examples:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml --profile full up -d
##############################################################################

services:

  # ===========================================================================
  # DATA LAYER (TEST)
  # ===========================================================================

  postgres-test:
    image: postgres:16-alpine
    container_name: postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maestro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maestro_test}
      POSTGRES_DB: ${POSTGRES_DB:-cibseven_test}
    ports:
      - "5433:5432"
    volumes:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maestro}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [test-network]

  redis-test:
    image: redis:7.2-alpine
    container_name: redis-test
    profiles: [full, messaging]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [test-network]

  kafka-test:
    image: apache/kafka:3.7.0
    container_name: kafka-test
    profiles: [full, messaging]
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-test:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-test:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: maestro-test-cluster-001
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [test-network]

  # ===========================================================================
  # ORCHESTRATION LAYER - CIB Seven 2.1.3 (TEST)
  # ===========================================================================

  cib7-engine-test:
    image: cibseven/cibseven-bpm-platform:2.1.3
    container_name: cib7-engine-test
    ports:
      - "8081:8080"
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres-test:5432/${POSTGRES_DB:-cibseven_test}
      DB_USERNAME: ${POSTGRES_USER:-maestro}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-maestro_test}
      # Multi-tenancy
      CIBSEVEN_BPM_MULTITENANCY_ENABLED: "true"
      CIBSEVEN_BPM_DEFAULT_TENANT: test-tenant
      # Job execution
      CIBSEVEN_BPM_JOB_EXECUTION_CORE_POOL_SIZE: "2"
      CIBSEVEN_BPM_JOB_EXECUTION_MAX_POOL_SIZE: "4"
      # External task
      CIBSEVEN_BPM_EXTERNAL_TASK_LOCK_DURATION: "60000"
      # History cleanup
      CIBSEVEN_BPM_HISTORY_CLEANUP_ENABLED: "true"
      CIBSEVEN_BPM_HISTORY_CLEANUP_BATCH_SIZE: "50"
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/engine-rest/engine || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks: [test-network]

  # ===========================================================================
  # INTEGRATION LAYER (TEST)
  # ===========================================================================

  hapi-fhir-test:
    image: hapiproject/hapi:v7.4.0
    container_name: hapi-fhir-test
    profiles: [full, fhir]
    ports:
      - "8083:8080"
    environment:
      spring.datasource.url: jdbc:postgresql://postgres-test:5432/hapi_fhir_test
      spring.datasource.username: ${POSTGRES_USER:-maestro}
      spring.datasource.password: ${POSTGRES_PASSWORD:-maestro_test}
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.reuse_cached_search_results_millis: "30000"
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/fhir/metadata || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks: [test-network]

  keycloak-test:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak-test
    profiles: [full, auth]
    command: start-dev --import-realm
    ports:
      - "8181:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-test:5432/keycloak_test
      KC_DB_USERNAME: ${POSTGRES_USER:-maestro}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-maestro_test}
    volumes:
      - ./config/keycloak/austa-bpm-realm.json:/opt/keycloak/data/import/austa-bpm-realm.json:ro
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [test-network]

networks:
  test-network:
    driver: bridge
