# =============================================================================
# Grafana — Datasource: CIB Seven PostgreSQL
# Acesso direto ao banco do CIB Seven para dashboards de negócio
# =============================================================================

apiVersion: 1

datasources:
  - name: CIB Seven DB
    type: postgres
    access: proxy
    url: postgres:5432
    database: cibseven
    user: maestro
    secureJsonData:
      password: maestro_local
    uid: cibseven-pg
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    editable: true
