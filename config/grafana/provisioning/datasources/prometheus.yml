# =============================================================================
# Grafana — Datasource Provisioning (Prometheus)
# Carregado automaticamente ao subir o container Grafana
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: prometheus-maezo
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    editable: false
