# =============================================================================
# Grafana — Dashboard Provisioning
# Carrega automaticamente todos os JSONs da pasta /dashboards
# =============================================================================

apiVersion: 1

providers:
  - name: MAEZO
    orgId: 1
    folder: "MAEZO Healthcare"
    folderUid: maezo-healthcare
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
