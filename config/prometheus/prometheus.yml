# =============================================================================
# MAEZO — Prometheus Scrape Configuration (ambiente LOCAL)
#
# Targets:
#   Workers RC/CO/PA/PS  — /metrics na porta 8000 (mapeada 8100-8103)
#   CE API               — /metrics na porta 8000 (mapeada 8000)
#   kafka-exporter       — /metrics na porta 9308
#   postgres-exporter    — /metrics na porta 9187
#   Prometheus itself    — self-monitoring
#
# Retenção de dados: 15 dias (padrão)
# Scrape interval padrão: 15s
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: local
    platform: maezo

# ---------------------------------------------------------------------------
# Alerting (não configurado em local — apenas Prometheus)
# ---------------------------------------------------------------------------
alerting:
  alertmanagers: []

# ---------------------------------------------------------------------------
# Scrape jobs
# ---------------------------------------------------------------------------
scrape_configs:

  # ── Prometheus self-monitoring ─────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  # ── Workers CIB Seven External Task ────────────────────────────────────
  # Cada worker expõe /health e /metrics na porta 8000 interna
  - job_name: maezo_workers
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - workers_rc:8000
          - workers_co:8000
          - workers_pa:8000
          - workers_ps:8000
        labels:
          component: worker
    relabel_configs:
      # Extrai o nome do worker do target (ex: workers_rc → rc)
      - source_labels: [__address__]
        regex: 'workers_(.+):.*'
        target_label: domain
        replacement: '${1}'

  # ── Contract Extraction API ─────────────────────────────────────────────
  - job_name: maezo_ce_api
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["ce_api:8000"]
        labels:
          component: api
          service: contract_extraction

  # ── CIB Seven BPM Engine (via json_exporter, endpoint /sum) ────────────
  # Cada job scrapa uma métrica específica usando o módulo correspondente
  - job_name: cib7_bpm
    scrape_interval: 15s
    metrics_path: /probe
    static_configs:
      - targets:
          - "http://cib7:8080/engine-rest/metrics/process-instances/sum|process_instances"
          - "http://cib7:8080/engine-rest/metrics/flow-node-instances/sum|flow_node_instances"
          - "http://cib7:8080/engine-rest/metrics/job-successful/sum|job_successful"
          - "http://cib7:8080/engine-rest/metrics/job-failed/sum|job_failed"
          - "http://cib7:8080/engine-rest/metrics/activity-instance-end/sum|activity_instance_end"
          - "http://cib7:8080/engine-rest/metrics/decision-instances/sum|decision_instances"
        labels:
          component: bpm_engine
          service: cibseven
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.*?)\\|(.*)"
        target_label: __param_target
        replacement: "${1}"
      - source_labels: [__address__]
        regex: "(.*?)\\|(.*)"
        target_label: __param_module
        replacement: "${2}"
      - source_labels: [__address__]
        regex: "(.*?)\\|(.*)"
        target_label: cib7_metric
        replacement: "${2}"
      - target_label: __address__
        replacement: "cib7_exporter:7979"

  # ── Kafka Exporter ──────────────────────────────────────────────────────
  # Métricas de consumer lag, tópicos e partições
  - job_name: kafka
    scrape_interval: 30s
    static_configs:
      - targets: ["kafka_exporter:9308"]
        labels:
          component: kafka
          service: kafka_exporter

  # ── PostgreSQL Exporter ─────────────────────────────────────────────────
  # Métricas de conexões, queries, replication, tamanho de databases
  - job_name: postgres
    scrape_interval: 30s
    static_configs:
      - targets: ["postgres_exporter:9187"]
        labels:
          component: database
          service: postgresql

  # ── Node Exporter — métricas do host (CPU, RAM, disco, rede) ───────────
  # node_exporter usa network_mode: host → acessível via host.docker.internal
  - job_name: node
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          component: infrastructure
          service: node_exporter

  # ── cAdvisor — métricas por container Docker ────────────────────────────
  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          component: infrastructure
          service: cadvisor
