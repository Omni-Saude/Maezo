global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules.yml"

# Alerting configuration removed - alertmanager service not deployed
# To enable alerting:
#   1. Add alertmanager service to docker-compose.yml
#   2. Uncomment the alerting block below
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - "alertmanager:9093"

scrape_configs:
  - job_name: "cib7-workers"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "worker-billing:8000"
          - "worker-clinical:8000"
          - "worker-access:8000"
          - "worker-platform:8000"
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.*):.*"
        target_label: instance

  - job_name: "cib7-engine"
    metrics_path: "/engine-rest/metrics"
    static_configs:
      - targets:
          - "cib7-engine:8080"
