# HAPI FHIR v7.x — Configuração para PostgreSQL (ambiente local de desenvolvimento)
# Montado em /app/config/application.yaml no container (Spring Boot config override)
# Ref: https://github.com/hapifhir/hapi-fhir-jpaserver-starter#docker-compose

spring:
  datasource:
    url: 'jdbc:postgresql://postgres:5432/hapi_fhir'
    username: maestro
    password: maestro_local
    driverClassName: org.postgresql.Driver
  jpa:
    properties:
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      hibernate.search.enabled: false
    hibernate:
      ddl-auto: update
  batch:
    job:
      enabled: false

hapi:
  fhir:
    fhir_version: R4
    server_address: http://localhost:8082/fhir
    bulk_export_enabled: false
    # Permite IDs numéricos enviados pelo cliente (necessário para seed com IDs do Tasy)
    client_id_strategy: ANY
    # Dev: desabilita validação de referências para permitir carga incremental de catálogos
    enforce_referential_integrity_on_write: false
    cors:
      allow_credentials: true
      allowed_origin:
        - '*'
