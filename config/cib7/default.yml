# CIB Seven Run — configuração customizada MAEZO
# Baseada no default.yml embutido da imagem cibseven/cibseven:run-latest
# Referência: https://docs.cibseven.org/manual/latest/user-guide/cibseven-run/

camunda.bpm:
  admin-user:
    id: demo
    password: demo
  filter:
    create: All tasks
  run:
    cors:
      enabled: true
      allowed-origins: "*"
    rest:
      disable-wadl: false
    deployment:
      deploy-changed-only: true
    example:
      enabled: true
    auth:
      enabled: true
      authentication: pseudo
  generic-properties.properties:
    useCibSevenNamespaceInScripting: false
    useCibSevenNamespaceInReflection: false

spring.datasource:
  url: jdbc:h2:./camunda-h2-default/process-engine;TRACE_LEVEL_FILE=0;DB_CLOSE_ON_EXIT=FALSE
  driver-class-name: org.h2.Driver
  username: sa
  password: sa

spring.web.resources:
  static-locations: NULL

spring:
  config:
    import:
      - optional:classpath:cibseven-webclient.properties
      - optional:classpath:cibseven-webclient.yaml
  # -- SMTP para recuperação de senha ----------------------------------------
  mail:
    host: smtppro.zoho.com
    port: 465
    username: naoresponda@austa.com.br
    password: Naomud@r25
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false

logging:
  level:
    root: INFO

cibseven:
  webclient:
    engineRest:
      url: http://localhost:8080
    historyLevel: full
    authentication:
      jwtSecret:
      tokenValidMinutes: 60
      tokenProlongMinutes: 1440
    # -- Recuperação de senha --------------------------------------------------
    auth:
      passwordReset:
        enabled: true
        fromEmail: naoresponda@austa.com.br
    ldap:
      url: ldap://ldap.cibseven.org
      folder: DC=cibseven,DC=org
      userNameAttribute: samAccountName
      userDisplayNameAttribute: name
      modifiedDateFormat: yyyyMMddHHmmss.SX
      followReferrals: follow
    bpm:
      provider: org.cibseven.webapp.providers.SevenProvider
    user:
      provider: org.cibseven.webapp.auth.SevenUserProvider
    users:
      search:
        wildcard:
    fetchInstances: true
    fetchIncidents: true
    token:
      secret:
      deny:
        external:
          ip: true
    datasource:
      fileValue:
        enabled: false
    cockpit:
      url: /camunda/app/cockpit/default/
    theme: cib
    services:
      basePath: services/v1
    api:
      common:
        title: "CIB seven webclient API"
        description: "This API exposes the functionality of CIB seven webclient as a REST service under the Apache License 2.0."
        termsOfService: "https://www.apache.org/licenses/LICENSE-2.0"
        license: "Apache 2.0"
        licenseUrl: "https://www.apache.org/licenses/LICENSE-2.0"
        contact:
          name: "CIB seven"
          url: "https://cibseven.org"
          email: "info@cibseven.org"
        url:

springdoc:
  api-docs:
    path: /webapp/v3/api-docs
  swagger-ui:
    path: /webapp/swagger-ui
    operationsSorter: alpha
    tagsSorter: alpha
    doc-expansion: none

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health,info
  endpoint:
    info:
      enabled: true
    health:
      enabled: true
      probes:
        enabled: true
  info:
    build:
      enabled: true
    git:
      enabled: true
      mode: full
    java:
      enabled: true
