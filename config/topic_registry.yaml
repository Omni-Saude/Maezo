# Topic Registry — AUSTA Healthcare Platform
#
# Defines External Task worker topics for CIB Seven orchestration.
# Each topic maps process context → DMN decision logic → task actions.
#
# Schema:
#   topic_name (dot.snake_case):
#     archetype:       One of 7 archetypes (see below)
#     dmn_key:         Single DMN decision ID (mutually exclusive with dmn_pipeline)
#     dmn_pipeline:    Array of DMN decisions applied sequentially (for complex routing)
#     dmn_category:    FederatedDMNService category (for tenant/global resolution)
#     input_map:       Context variable names → DMN input parameter names
#     output_map:      DMN output names → result variable names
#     error_strategy:  'fail_closed' (BLOQUEAR) or 'fail_safe' (REVISAR)
#     timeout_ms:      Task lock duration (default: 300000 / 5 min)
#     retry_backoff:   Retry configuration (default: exponential 3 attempts)
#
# Archetypes:
#   ADMIN_ADJUDICATION       — Authorization, eligibility, claims adjudication
#   CLINICAL_ALERT           — Sepsis, NEWS2, critical thresholds (immediate escalation)
#   CLINICAL_SCORE           — Risk scores, SOFA, qSOFA (diagnostic, non-blocking)
#   OPERATIONAL_ROUTING      — Triage, bed allocation, staff assignment
#   COMPLIANCE_VALIDATION    — LGPD, audit trail, documentation integrity
#   FINANCIAL_CALCULATION    — Pricing, denial analysis, revenue impact
#   DATA_ENRICHMENT          — FHIR normalization, data quality enhancement
#
# Error Strategies:
#   fail_closed (BLOQUEAR)   — Stop process immediately; escalate to human
#   fail_safe (REVISAR)      — Continue process; queue for async review
#

topics:

  # ============================================================================
  # ADMIN_ADJUDICATION: Billing claim validation with multi-step DMN pipeline
  # ============================================================================

  billing.validate_claim:
    archetype: ADMIN_ADJUDICATION
    dmn_pipeline:
      - key: DMN-RC-001
        category: eligibility_rules
        merge_strategy: worst_case
      - key: DMN-RC-004
        category: tiss_validation
        merge_strategy: worst_case
      - key: DMN-RC-005
        category: coding_optimization
        merge_strategy: best_case
    dmn_category: revenue_cycle
    input_map:
      claimFhirId: claim_id
      payerId: payer_id
      procedureCodes: procedure_list
      billableAmount: amount_claimed
      coverageFhirId: coverage_id
      documentationScore: doc_completeness
    output_map:
      validationStatus: claim_status
      auditFlags: compliance_alerts
      optimizedCodes: suggested_cid_codes
      recommendedAction: action
    error_strategy: fail_closed
    timeout_ms: 15000
    description: >
      Validates billing claim across eligibility, TISS, and coding rules.
      Returns validation status and recommended action (PROSSEGUIR, REVISAR, BLOQUEAR).
      Fail-closed ensures manual review on error.

  # ============================================================================
  # CLINICAL_SCORE: Multi-stage sepsis detection with pipeline routing
  # ============================================================================

  clinical.auditing:
    archetype: CLINICAL_SCORE
    dmn_pipeline:
      - key: DMN-CA-001
        category: sepsis_protocol
        merge_strategy: worst_case
      - key: DMN-CA-002
        category: news2_escalation
        merge_strategy: worst_case
      - key: DMN-RC-003
        category: clinical_risk_assessment
        merge_strategy: worst_case
    dmn_category: clinical_operations
    input_map:
      patientFhirId: patient_id
      vitalSigns: vitals_object
      labValues: lab_results
      age: patient_age
      comorbidities: comorbidity_list
      qsofaComponents: qsofa_data
      news2Scores: news2_individual_scores
    output_map:
      qsofaScore: qsofa_total
      sepsisRiskLevel: sepsis_risk
      news2Score: news2_total
      escalationLevel: alert_severity
      recommendedAction: clinical_action
      notificationTargets: escalation_recipients
    error_strategy: fail_safe
    timeout_ms: 5000
    description: >
      Multi-stage clinical scoring (qSOFA → NEWS2 → Risk Assessment).
      Uses worst_case merge for all stages to prioritize patient safety.
      Escalates based on severity (ALERTA_CRÍTICA, REVISÃO_URGENTE, PROSSEGUIR_MONITORAMENTO).
      Fail-safe allows continued monitoring even on evaluation error.

  # ============================================================================
  # OPERATIONAL_ROUTING: Triage and patient flow routing
  # ============================================================================

  emergency.triage_status:
    archetype: OPERATIONAL_ROUTING
    dmn_key: DMN-CO-001
    dmn_category: clinical_operations
    input_map:
      patientFhirId: patient_id
      chiefComplaint: complaint_text
      vitalSigns: vitals_object
      age: patient_age
      acuityIndicators: acuity_flags
      bedAvailability: bed_status
      specialtyNeeds: specialty_requirements
    output_map:
      triageLevel: acuity_level
      recommendedLocation: location_code
      estimatedWaitTime: wait_minutes
      assignedTeam: team_id
      routingAction: action
    error_strategy: fail_closed
    timeout_ms: 10000
    description: >
      Routes incoming emergency patients to appropriate triage level and location.
      Returns acuity level (Vermelho/Amarelo/Verde/Azul per Brazilian protocols),
      recommended location, and assigned care team.
      Fail-closed ensures escalation if routing logic fails.

  # ============================================================================
  # FINANCIAL_CALCULATION: Denial analysis and contestation priority
  # ============================================================================

  financial.analyze_denial:
    archetype: FINANCIAL_CALCULATION
    dmn_key: DMN-RC-003
    dmn_category: revenue_cycle
    input_map:
      denialCode: denial_code
      denialReason: denial_text
      claimFhirId: claim_id
      payerId: payer_id
      claimAmount: claim_value
      historicalRecoveryRate: payer_recovery_pct
      documentationScore: doc_quality
    output_map:
      contestationText: contestation_narrative
      contestationPriority: priority_rank
      recoveryProbability: expected_recovery_pct
      recommendedAction: action
      appealDeadline: deadline_date
    error_strategy: fail_safe
    timeout_ms: 30000
    description: >
      Analyzes denial reason and generates contestation text with priority scoring.
      Uses historical payer recovery rates and documentation quality to estimate
      recovery probability. Returns priority (ALTA, MÉDIA, BAIXA) for queue ordering.
      Fail-safe allows manual contestation if analysis fails.

  # ============================================================================
  # DATA_ENRICHMENT: FHIR normalization from ERP data
  # ============================================================================

  data.normalize_fhir:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-DA-001
    dmn_category: data_quality
    input_map:
      erpSystem: source_system
      erpEntityType: entity_type
      erpData: raw_entity
      tenantId: tenant_code
      dataQualityFlags: quality_issues
    output_map:
      fhirResourceId: resource_id
      fhirJson: resource_json
      normalizedStatus: normalization_status
      qualityScore: quality_rating
      recommendedAction: action
    error_strategy: fail_safe
    timeout_ms: 20000
    description: >
      Normalizes ERP data (Tasy/MV Soul) to FHIR R4 resources.
      Returns FHIR resource ID and quality score.
      Fail-safe allows process continuation with quality flag.

  # ============================================================================
  # COMPLIANCE_VALIDATION: Audit trail and LGPD data handling
  # ============================================================================

  compliance.validate_audit_trail:
    archetype: COMPLIANCE_VALIDATION
    dmn_key: DMN-CMP-001
    dmn_category: governance
    input_map:
      processInstanceId: process_id
      taskId: task_id
      userId: user_id
      dataAccessed: accessed_fields
      actionPerformed: action_type
      timestamp: event_timestamp
      tenantId: tenant_code
    output_map:
      complianceStatus: audit_status
      piiDetected: pii_flag
      retentionPolicy: retention_days
      recommendedAction: action
      auditLogId: log_id
    error_strategy: fail_closed
    timeout_ms: 5000
    description: >
      Validates each task against LGPD/ANS compliance rules.
      Detects PII patterns, applies retention policies, logs audit trail.
      Returns compliance status (CONFORME, NÃO_CONFORME, REVISÃO_NECESSÁRIA).
      Fail-closed escalates to compliance officer on error.

  # ============================================================================
  # CLINICAL_ALERT: WhatsApp notification with template selection
  # ============================================================================

  communication.send_patient_notification:
    archetype: CLINICAL_ALERT
    dmn_key: DMN-COM-001
    dmn_category: communication
    input_map:
      patientFhirId: patient_id
      patientPhone: phone_number
      notificationType: notification_type
      templateId: template_code
      templateParams: param_map
      preferredLanguage: language_code
      communicationPreferences: pref_object
    output_map:
      messageId: msg_id
      deliveryStatus: status
      deliveryTimestamp: sent_at
      recipientConfirmed: confirmed_flag
      recommendedAction: action
    error_strategy: fail_safe
    timeout_ms: 10000
    description: >
      Selects WhatsApp template and sends patient notification (appointments,
      pre-auth results, discharge instructions, NPS survey).
      Respects patient preferences and communication opt-ins.
      Returns delivery status (ENVIADO, FALHA_TEMPORÁRIA, BLOQUEADO).
      Fail-safe queues for retry without blocking process.

  # ============================================================================
  # ADMIN_ADJUDICATION: Authorization request routing to payer
  # ============================================================================

  authorization.request_payer:
    archetype: ADMIN_ADJUDICATION
    dmn_key: DMN-RC-002
    dmn_category: revenue_cycle
    input_map:
      encounterFhirId: encounter_id
      procedureCodes: procedure_list
      payerId: payer_id
      procedureType: procedure_category
      estimatedCost: cost_estimate
      urgencyLevel: urgency_code
      patientAge: age
    output_map:
      authorizationNumber: auth_number
      authorizationStatus: auth_status
      authorizedAmount: approved_amount
      authorizedDays: approved_days
      authorizationDeadline: deadline_date
      recommendedAction: action
    error_strategy: fail_closed
    timeout_ms: 30000
    description: >
      Routes authorization requests to payer based on procedure type and cost threshold.
      Returns authorization number and approval details.
      Fail-closed escalates manual authorization request if payer lookup fails.

  # ============================================================================
  # FINANCIAL_CALCULATION: TISS XML generation with validation
  # ============================================================================

  billing.generate_tiss:
    archetype: FINANCIAL_CALCULATION
    dmn_pipeline:
      - key: DMN-RC-004
        category: tiss_validation
        merge_strategy: worst_case
      - key: DMN-RC-001
        category: eligibility_rules
        merge_strategy: best_case
    dmn_category: revenue_cycle
    input_map:
      encounterFhirId: encounter_id
      billingItems: billing_items_list
      payerId: payer_id
      ansVersion: ans_version_code
      patientFhirId: patient_id
      coverageFhirId: coverage_id
    output_map:
      tissXml: tiss_xml_content
      tissHash: file_hash
      validationErrors: error_list
      totalBilledAmount: amount
      recommendedAction: action
    error_strategy: fail_closed
    timeout_ms: 15000
    description: >
      Generates ANS-compliant TISS 4.01 XML with validation against
      payer-specific rules. Uses worst_case merge for validation,
      best_case merge for eligibility. Returns XML and validation status.
      Fail-closed prevents invalid submission.

  # ============================================================================
  # DATA_ENRICHMENT: FHIR observation capture from IoT/RFID
  # ============================================================================

  production.capture_charges:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-RC-004
    dmn_category: revenue_cycle
    input_map:
      encounterFhirId: encounter_id
      iotEventIds: event_id_list
      procedureCode: procedure_code
      itemCode: material_code
      quantity: item_quantity
      patientFhirId: patient_id
      departmentCode: dept_code
    output_map:
      billingItems: billing_object_list
      captureCompleteness: completeness_pct
      consumptionRecord: consumption_entry
      recommendedAction: action
    error_strategy: fail_safe
    timeout_ms: 15000
    description: >
      Converts IoT/RFID charge capture events to billing items with
      procedure and material code validation. Returns billing items array
      and completeness percentage for the encounter.
      Fail-safe queues unmatched charges for manual review.

  # ============================================================================
  # ADMIN_ADJUDICATION: Pre-authorization review by adjudication team
  # ============================================================================

  authorization.pre_auth_review:
    archetype: ADMIN_ADJUDICATION
    dmn_key: DMN-RC-006
    dmn_category: revenue_cycle
    input_map:
      preAuthFhirId: pre_auth_id
      procedureCodes: procedure_list
      payerId: payer_id
      claimAmount: requested_amount
      clinicalNotes: clinical_documentation
      doctorSpecialty: specialty_code
      urgencyFlag: is_urgent
      denialHistory: past_denials_count
    output_map:
      adjudicationDecision: decision_status
      approvedAmount: approved_amount
      reviewComments: adjudication_notes
      escalationFlag: requires_escalation
      recommendedAction: action
    error_strategy: fail_closed
    timeout_ms: 20000
    description: >
      Validates pre-authorization requests against payer rules and clinical guidelines.
      Returns adjudication decision (APROVADO, NEGADO, REVISAR) and approved amount.
      Escalates to human adjudicator if decision threshold exceeded.
      Fail-closed ensures manual review on DMN evaluation error.

  # ============================================================================
  # CLINICAL_ALERT: Drug interaction screening
  # ============================================================================

  clinical.drug_interaction_check:
    archetype: CLINICAL_ALERT
    dmn_key: DMN-CA-003
    dmn_category: clinical_operations
    input_map:
      patientFhirId: patient_id
      currentMedications: active_meds_list
      proposedMedication: new_drug_code
      patientAge: age
      patientGender: gender
      renalFunction: creatinine_clearance
      hepaticFunction: liver_score
      drugAllergies: allergy_list
    output_map:
      interactionLevel: severity_level
      interactingDrugs: conflicting_meds
      clinicalRecommendation: recommendation_text
      pharmacistNotification: notify_flag
      recommendedAction: action
    error_strategy: fail_safe
    timeout_ms: 8000
    description: >
      Screens proposed medication against patient's active medications and allergies.
      Returns interaction severity (CRÍTICA, MODERADA, LEVE, AUSENTE) and clinical
      recommendation (PRESCREVER, REVISAR_DOSAGEM, BLOQUEAR).
      Fail-safe logs alert for pharmacist review without blocking prescription.

  # ============================================================================
  # CLINICAL_SCORE: Risk score calculation for patient stratification
  # ============================================================================

  clinical.risk_score_calculation:
    archetype: CLINICAL_SCORE
    dmn_key: DMN-CA-004
    dmn_category: clinical_operations
    input_map:
      patientFhirId: patient_id
      age: patient_age
      labValues: lab_results_object
      vitalSigns: vitals_object
      comorbidities: comorbidity_list
      hospitalizationDays: los_count
      recentAdmissions: admission_history
      functionStatus: adl_score
    output_map:
      riskScore: total_risk_points
      riskCategory: risk_tier
      interventionLevel: care_intensity
      priorityFlag: priority_ranking
      recommendedAction: action
    error_strategy: fail_safe
    timeout_ms: 7000
    description: >
      Calculates patient risk score combining demographic, clinical, and
      utilization factors. Returns risk tier (BAIXO, MÉDIO, ALTO, CRÍTICO)
      for care planning and resource allocation.
      Fail-safe defaults to MÉDIO risk if calculation fails.

  # ============================================================================
  # OPERATIONAL_ROUTING: Bed assignment and patient placement
  # ============================================================================

  patient.bed_assignment:
    archetype: OPERATIONAL_ROUTING
    dmn_key: DMN-CO-002
    dmn_category: clinical_operations
    input_map:
      patientFhirId: patient_id
      admissionType: admission_category
      acuityLevel: triage_level
      specialtyNeeds: specialty_list
      isolationRequirements: isolation_precautions
      mobilityStatus: mobility_level
      bedPreferences: patient_preferences
      locationAvailability: bed_inventory
    output_map:
      assignedBedId: bed_id
      assignedUnit: unit_code
      roomType: room_category
      specialServices: service_list
      recommendedAction: action
    error_strategy: fail_closed
    timeout_ms: 10000
    description: >
      Routes admitted patient to appropriate bed based on acuity, specialty needs,
      and isolation precautions. Returns bed ID, unit assignment, and any special
      services required. Coordinates with real-time bed availability.
      Fail-closed escalates to bed management coordinator if no suitable bed.

  # ============================================================================
  # COMPLIANCE_VALIDATION: ANS compliance verification for care decisions
  # ============================================================================

  regulatory.ans_compliance_check:
    archetype: COMPLIANCE_VALIDATION
    dmn_pipeline:
      - key: DMN-CMP-002
        category: ans_coverage_rules
        merge_strategy: worst_case
      - key: DMN-CMP-003
        category: documentation_requirements
        merge_strategy: worst_case
    dmn_category: governance
    input_map:
      planId: health_plan_id
      procedureCode: procedure_code
      patientAge: age
      diagnosisCodes: icd_codes
      clinicalJustification: medical_notes
      requiredDocumentation: doc_checklist
      institutionCode: provider_code
    output_map:
      ansComplianceStatus: compliance_flag
      coverageConfirmed: coverage_status
      missingDocuments: doc_gaps_list
      complianceNotes: validation_comments
      recommendedAction: action
    error_strategy: fail_closed
    timeout_ms: 12000
    description: >
      Two-stage ANS compliance validation: coverage rules + documentation requirements.
      Uses worst_case merge to ensure no coverage loopholes. Returns compliance status
      (CONFORME, NÃO_CONFORME, CONTINGÊNCIA) and missing documentation list.
      Fail-closed prevents non-compliant care delivery.

  # ============================================================================
  # FINANCIAL_CALCULATION: Procedure pricing and cost estimation
  # ============================================================================

  billing.procedure_pricing:
    archetype: FINANCIAL_CALCULATION
    dmn_key: DMN-RC-007
    dmn_category: revenue_cycle
    input_map:
      procedureCode: procedure_code
      payerId: payer_id
      patientAge: age
      patientLocation: location_code
      procedureUrgency: urgency_level
      equipmentUsed: equipment_list
      estimatedDuration: duration_minutes
      complexity: procedure_complexity
    output_map:
      basePrice: base_amount
      adjustedPrice: final_amount
      priceComponents: component_breakdown
      validityPeriod: price_expiry_date
      recommendedAction: action
    error_strategy: fail_closed
    timeout_ms: 8000
    description: >
      Calculates procedure pricing based on ANS table, payer contracts, and
      adjustment factors (urgency, complexity, equipment). Returns itemized cost
      estimate (APROVADO, AJUSTE_NECESSÁRIO, FORA_TABELA).
      Fail-closed prevents billing at incorrect rates.

  # ============================================================================
  # DATA_ENRICHMENT: Patient demographic enrichment from external sources
  # ============================================================================

  patient.demographic_enrichment:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-DA-002
    dmn_category: data_quality
    input_map:
      patientFhirId: patient_id
      cpf: cpf_number
      basicDemographics: demographic_object
      contactInfo: contact_object
      registrySource: source_system
      qualityFlags: data_quality_issues
      lastUpdateDate: last_modified
    output_map:
      enrichedDemographics: enriched_object
      dataQuality: quality_score
      matchConfidence: confidence_pct
      addressNormalized: normalized_address
      recommendedAction: action
    error_strategy: fail_safe
    timeout_ms: 10000
    description: >
      Enriches patient demographics from SADT, external CRM, and government registries.
      Validates CPF, normalizes addresses, confirms contact information.
      Returns enriched data object with quality score (VÁLIDO, PARCIAL, REVISÃO_NECESSÁRIA).
      Fail-safe preserves existing data if enrichment service unavailable.

  # ============================================================================
  # DATA_ENRICHMENT: Audit finding consolidation across multiple DMN tables
  # ============================================================================

  clinical.audit_consolidation:
    archetype: DATA_ENRICHMENT
    dmn_pipeline:
      - key: DMN-CMP-004
        category: clinical_audit_findings
        merge_strategy: append
      - key: DMN-CMP-005
        category: documentation_audit_findings
        merge_strategy: append
    dmn_category: governance
    input_map:
      processInstanceId: process_id
      encounterId: encounter_id
      auditPeriod: audit_period
      clinicalActions: action_list
      documentationItems: doc_item_list
      auditorId: auditor_id
      tenantId: tenant_code
    output_map:
      consolidatedFindings: findings_list
      totalFindingsCount: findings_count
      findingsSeverity: severity_breakdown
      auditCompleteness: completeness_pct
      recommendedAction: action
    error_strategy: fail_safe
    timeout_ms: 20000
    description: >
      Consolidates audit findings from clinical actions and documentation reviews
      across two DMN tables. Uses append merge so findings from both tables are
      accumulated into a unified list rather than overwritten.
      Returns combined findings array, severity breakdown, and completeness score.
      Fail-safe preserves partial findings if one DMN stage fails.

  # ============================================================================
  # FINANCIAL_CALCULATION: Pricing override pipeline where later rules take precedence
  # ============================================================================

  billing.override_pricing:
    archetype: FINANCIAL_CALCULATION
    dmn_pipeline:
      - key: DMN-RC-007
        category: base_pricing_table
        merge_strategy: override
      - key: DMN-RC-008
        category: payer_contract_overrides
        merge_strategy: override
    dmn_category: revenue_cycle
    input_map:
      procedureCode: procedure_code
      payerId: payer_id
      contractId: contract_id
      patientCategory: patient_category
      procedureUrgency: urgency_level
      billingDate: billing_date
      tenantId: tenant_code
    output_map:
      finalPrice: override_amount
      appliedContractId: applied_contract
      overrideReason: override_justification
      priceSource: price_origin
      recommendedAction: action
    error_strategy: fail_closed
    timeout_ms: 10000
    description: >
      Two-stage pricing pipeline where payer contract rules override the base
      ANS pricing table. Uses override merge so payer-specific contract values
      fully replace base prices when a matching contract exists.
      Returns final effective price, applied contract ID, and override justification.
      Fail-closed prevents billing at incorrect or unverified rates.

  # ============================================================================
  # COMPLIANCE_VALIDATION: Access control and identity management stubs
  # ============================================================================

  access_control.audit:
    archetype: COMPLIANCE_VALIDATION
    dmn_key: DMN-STUB-AC
    dmn_category: access_control
    error_strategy: fail_safe
    description: "Stub: access control audit trail validation"

  access_control.authentication:
    archetype: COMPLIANCE_VALIDATION
    dmn_key: DMN-STUB-AC
    dmn_category: access_control
    error_strategy: fail_safe
    description: "Stub: user authentication compliance check"

  access_control.data_access:
    archetype: COMPLIANCE_VALIDATION
    dmn_key: DMN-STUB-AC
    dmn_category: access_control
    error_strategy: fail_safe
    description: "Stub: data access authorization validation"

  access_control.denial:
    archetype: COMPLIANCE_VALIDATION
    dmn_key: DMN-STUB-AC
    dmn_category: access_control
    error_strategy: fail_safe
    description: "Stub: access denial event processing and logging"

  access_control.provisioning:
    archetype: COMPLIANCE_VALIDATION
    dmn_key: DMN-STUB-AC
    dmn_category: access_control
    error_strategy: fail_safe
    description: "Stub: user provisioning compliance validation"

  access_control.restriction:
    archetype: COMPLIANCE_VALIDATION
    dmn_key: DMN-STUB-AC
    dmn_category: access_control
    error_strategy: fail_safe
    description: "Stub: access restriction enforcement check"

  # ============================================================================
  # DATA_ENRICHMENT: Analytics and intelligence reporting stubs
  # ============================================================================

  analytics.analyze_payer_performance:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-STUB-ANA
    dmn_category: analytics
    error_strategy: fail_safe
    description: "Stub: payer performance analysis for revenue intelligence"

  analytics.calculate_collection_rate:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-STUB-ANA
    dmn_category: analytics
    error_strategy: fail_safe
    description: "Stub: collection rate calculation for analytics dashboard"

  analytics.calculate_dso:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-STUB-ANA
    dmn_category: analytics
    error_strategy: fail_safe
    description: "Stub: days sales outstanding (DSO) calculation"

  analytics.generate_executive_dashboard:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-STUB-ANA
    dmn_category: analytics
    error_strategy: fail_safe
    description: "Stub: executive dashboard generation with KPI aggregation"

  analytics.generate_operational_metrics:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-STUB-ANA
    dmn_category: analytics
    error_strategy: fail_safe
    description: "Stub: operational metrics report generation"

  analytics.generate_recommendations:
    archetype: DATA_ENRICHMENT
    dmn_key: DMN-STUB-ANA
    dmn_category: analytics
    error_strategy: fail_safe
    description: "Stub: AI-driven recommendations based on analytics data"

  # ============================================================================
  # CLINICAL_ALERT: Clinical alert lifecycle management stubs
  # ============================================================================

  clinical.alert_classification:
    archetype: CLINICAL_ALERT
    dmn_key: DMN-STUB-CA
    dmn_category: clinical_operations
    error_strategy: fail_safe
    description: "Stub: clinical alert classification by severity and type"

  clinical.alert_logging:
    archetype: CLINICAL_ALERT
    dmn_key: DMN-STUB-CA
    dmn_category: clinical_operations
    error_strategy: fail_safe
    description: "Stub: clinical alert logging to audit trail"

  clinical.alert_notification:
    archetype: CLINICAL_ALERT
    dmn_key: DMN-STUB-CA
    dmn_category: clinical_operations
    error_strategy: fail_safe
    description: "Stub: clinical alert notification to care team"

  clinical.alert_resolution:
    archetype: CLINICAL_ALERT
