# =============================================================================
# CIB Seven BPM Engine — JSON Exporter Config
#
# Converte o endpoint REST /engine-rest/metrics (JSON array) em métricas
# Prometheus usando prometheuscommunity/json-exporter.
#
# Métricas expostas pelo CIB Seven:
#   process-instances       — instâncias de processo ativas
#   flow-node-instances     — nós BPMN executados
#   activity-instance-end   — atividades finalizadas
#   job-successful          — jobs executados com sucesso
#   job-failed              — jobs com falha
#   job-acquisition-attempt — tentativas de aquisição de job
#   job-acquired-success    — jobs adquiridos com sucesso
#   decision-instances      — avaliações DMN
#   executed-decision-elements — elementos DMN avaliados
#
# Uso com Prometheus:
#   scrape_configs:
#     - job_name: cib7_bpm
#       metrics_path: /probe
#       params:
#         target: ['http://cib7:8080/engine-rest/metrics']
#       static_configs:
#         - targets: ['cib7_exporter:7979']
# =============================================================================

# Nota: /engine-rest/metrics/{name}/sum retorna {"result": N}
# Usamos um job por métrica — cada um retorna um único número
modules:
  process_instances:
    metrics:
      - name: cib7_bpm_process_instances_total
        type: value
        path: "{.result}"
        help: "Total de instâncias de processo iniciadas no CIB Seven"
  flow_node_instances:
    metrics:
      - name: cib7_bpm_flow_node_instances_total
        type: value
        path: "{.result}"
        help: "Total de nós BPMN executados no CIB Seven"
  job_successful:
    metrics:
      - name: cib7_bpm_jobs_successful_total
        type: value
        path: "{.result}"
        help: "Total de jobs executados com sucesso"
  job_failed:
    metrics:
      - name: cib7_bpm_jobs_failed_total
        type: value
        path: "{.result}"
        help: "Total de jobs com falha"
  activity_instance_end:
    metrics:
      - name: cib7_bpm_activity_instances_ended_total
        type: value
        path: "{.result}"
        help: "Total de atividades BPMN finalizadas"
  decision_instances:
    metrics:
      - name: cib7_bpm_dmn_decisions_total
        type: value
        path: "{.result}"
        help: "Total de avaliações DMN realizadas"
