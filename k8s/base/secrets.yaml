# Maestro Healthcare Platform - Secrets Templates
# IMPORTANT: Replace placeholder values before applying
# Consider using External Secrets Operator or AWS Secrets Manager in production

---
# Database credentials
apiVersion: v1
kind: Secret
metadata:
  name: maestro-db-credentials
  namespace: maestro
  labels:
    app.kubernetes.io/part-of: maestro
type: Opaque
stringData:
  # PostgreSQL passwords - CHANGE THESE
  password: "CHANGE_ME_camunda_password"  # Camunda database
  fhir-password: "CHANGE_ME_fhir_password"  # FHIR database
  postgres-password: "CHANGE_ME_postgres_admin_password"  # Admin password

---
# Keycloak credentials
apiVersion: v1
kind: Secret
metadata:
  name: maestro-keycloak-credentials
  namespace: maestro
  labels:
    app.kubernetes.io/part-of: maestro
type: Opaque
stringData:
  admin-password: "CHANGE_ME_keycloak_admin_password"

---
# Worker Keycloak client credentials (ADR-008)
apiVersion: v1
kind: Secret
metadata:
  name: maestro-worker-credentials
  namespace: maestro
  labels:
    app.kubernetes.io/part-of: maestro
type: Opaque
stringData:
  # Client secrets for each worker domain
  # Generate with: openssl rand -hex 32
  revenueCycle-client-secret: "CHANGE_ME_revenue_cycle_secret"
  patientAccess-client-secret: "CHANGE_ME_patient_access_secret"
  clinicalOperations-client-secret: "CHANGE_ME_clinical_ops_secret"
  platformServices-client-secret: "CHANGE_ME_platform_services_secret"
  cdc-bridge-client-secret: "CHANGE_ME_cdc_bridge_secret"

---
# TASY API credentials
apiVersion: v1
kind: Secret
metadata:
  name: maestro-tasy-credentials
  namespace: maestro
  labels:
    app.kubernetes.io/part-of: maestro
type: Opaque
stringData:
  # TASY TIE Engine API access
  base-url: "https://tasy.austa.com.br/tie/api/v1"
  api-key: "CHANGE_ME_tasy_api_key"
  # OAuth2 credentials (if using OAuth2 instead of API key)
  oauth-client-id: ""
  oauth-client-secret: ""

---
# Grafana credentials
apiVersion: v1
kind: Secret
metadata:
  name: maestro-grafana-credentials
  namespace: maestro
  labels:
    app.kubernetes.io/part-of: maestro
type: Opaque
stringData:
  admin-password: "CHANGE_ME_grafana_admin_password"

---
# Alertmanager Slack webhook
apiVersion: v1
kind: Secret
metadata:
  name: maestro-alertmanager-secrets
  namespace: maestro
  labels:
    app.kubernetes.io/part-of: maestro
type: Opaque
stringData:
  slack-webhook-url: "https://hooks.slack.com/services/CHANGE_ME"

---
# TLS certificates (for self-signed in dev/staging)
# In production, use cert-manager with Let's Encrypt
apiVersion: v1
kind: Secret
metadata:
  name: maestro-tls
  namespace: maestro
  labels:
    app.kubernetes.io/part-of: maestro
type: kubernetes.io/tls
data:
  # Base64 encoded certificate and key
  # Generate with: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout tls.key -out tls.crt
  tls.crt: ""  # REPLACE with base64 encoded certificate
  tls.key: ""  # REPLACE with base64 encoded private key
