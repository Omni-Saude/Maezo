# Maestro Healthcare Orchestration Platform - Helm Chart
# Deploys complete BPM infrastructure: CIB7, Workers, FHIR, Kafka, Redis, Keycloak

apiVersion: v2
name: maestro
description: Healthcare Orchestration Platform based on CIB Seven (Camunda 7 fork)
type: application
version: 1.0.0
appVersion: "2.1.3"

keywords:
  - healthcare
  - bpm
  - camunda
  - fhir
  - orchestration

home: https://github.com/rodaquino-OMNI/Healthcare-Orchest-CIB7
sources:
  - https://github.com/rodaquino-OMNI/Healthcare-Orchest-CIB7

maintainers:
  - name: Grupo AUSTA
    email: devops@austa.com.br

dependencies:
  # External charts - will be fetched from repos
  - name: postgresql
    version: "15.5.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
    
  - name: kafka
    version: "28.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
    
  - name: redis
    version: "19.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    
  - name: keycloak
    version: "21.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: keycloak.enabled

annotations:
  # CIB Seven version (Camunda 7 fork)
  bpm.engine: "CIB Seven 2.1.3"
  fhir.version: "R4 (HAPI 7.4.0)"
  lgpd.compliant: "true"
  tenants: "austa-hospital,amh-sp-morumbi,amh-rj-barra,amh-mg-bh"
