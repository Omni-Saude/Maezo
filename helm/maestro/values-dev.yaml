# MAEZO Healthcare Platform - Development Environment Values
# Use with: helm upgrade --install maezo ./helm/maezo -f values.yaml -f values-dev.yaml

global:
  environment: dev
  domain: dev.austa.com.br

# Single replicas for dev
cibSeven:
  replicaCount: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  ingress:
    hosts:
      - host: bpm.dev.austa.com.br
        paths:
          - path: /
            pathType: Prefix

workers:
  domains:
    revenueCycle:
      replicaCount: 1
      autoscaling:
        enabled: false
    patientAccess:
      replicaCount: 1
      autoscaling:
        enabled: false
    clinicalOperations:
      replicaCount: 1
      autoscaling:
        enabled: false
    platformServices:
      replicaCount: 1
      autoscaling:
        enabled: false

hapiFhir:
  replicaCount: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  ingress:
    hosts:
      - host: fhir.dev.austa.com.br
        paths:
          - path: /fhir
            pathType: Prefix

cdcBridge:
  replicaCount: 1

webhookReceiver:
  replicaCount: 1
  ingress:
    hosts:
      - host: webhooks.dev.austa.com.br
        paths:
          - path: /api/callbacks
            pathType: Prefix

postgresql:
  primary:
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
    persistence:
      size: 20Gi

kafka:
  controller:
    replicaCount: 1
  broker:
    replicaCount: 1
    persistence:
      size: 10Gi

redis:
  architecture: standalone
  sentinel:
    enabled: false
  master:
    persistence:
      size: 2Gi
  replica:
    replicaCount: 0

keycloak:
  replicaCount: 1
  ingress:
    hostname: auth.dev.austa.com.br

observability:
  prometheus:
    retention: 7d
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
  grafana:
    ingress:
      hosts:
        - grafana.dev.austa.com.br

# Disable network policies in dev for easier debugging
networkPolicies:
  enabled: false

# Disable PDBs in dev (single replicas)
podDisruptionBudgets:
  cibSeven:
    minAvailable: 0
  hapiFhir:
    minAvailable: 0
  workers:
    minAvailable: 0
