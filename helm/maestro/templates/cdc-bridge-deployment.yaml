{{- if .Values.cdcBridge.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maestro.fullname" . }}-cdc-bridge
  labels:
    {{- include "maestro.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: cdc-bridge
spec:
  replicas: {{ .Values.cdcBridge.replicaCount }}
  selector:
    matchLabels:
      {{- include "maestro.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cdc-bridge
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8091"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "maestro.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cdc-bridge
    spec:
      serviceAccountName: {{ include "maestro.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: cdc-bridge
          image: "{{ .Values.cdcBridge.image.repository }}:{{ .Values.cdcBridge.image.tag }}"
          imagePullPolicy: {{ .Values.cdcBridge.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8091
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.cdcBridge.config.kafkaBootstrapServers | default (include "maestro.kafkaBootstrapServers" .) }}
            - name: KAFKA_CONSUMER_GROUP
              value: {{ .Values.cdcBridge.config.consumerGroup }}
            - name: CIB7_ENGINE_URL
              value: {{ include "maestro.cibSevenUrl" . }}
            - name: KEYCLOAK_URL
              value: {{ include "maestro.keycloakUrl" . }}
            - name: KEYCLOAK_CLIENT_ID
              value: cdc-bridge
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: maestro-cdc-bridge-credentials
                  key: keycloak-client-secret
                  optional: true
            - name: DEAD_LETTER_TOPIC
              value: {{ .Values.cdcBridge.config.deadLetterTopic | default "bridge.dead-letter" }}
            - name: MAX_RETRIES
              value: "{{ .Values.cdcBridge.config.maxRetries | default 3 }}"
            - name: RETRY_BACKOFF_MS
              value: "{{ .Values.cdcBridge.config.retryBackoffMs | default 1000 }}"
            - name: LOG_LEVEL
              value: {{ .Values.cdcBridge.config.logLevel | default "INFO" }}
            - name: TENANTS_CONFIG
              value: {{ include "maestro.tenantsJson" . | quote }}
            {{- if .Values.cdcBridge.config.topics }}
            - name: CDC_TOPICS
              value: {{ join "," .Values.cdcBridge.config.topics }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.cdcBridge.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      {{- with .Values.cdcBridge.nodeSelector | default dict }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cdcBridge.affinity | default dict }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cdcBridge.tolerations | default list }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
