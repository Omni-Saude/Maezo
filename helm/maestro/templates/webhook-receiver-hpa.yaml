{{- if and .Values.webhookReceiver.enabled .Values.webhookReceiver.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "maestro.fullname" . }}-webhook-receiver
  labels:
    {{- include "maestro.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-receiver
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "maestro.fullname" . }}-webhook-receiver
  minReplicas: {{ .Values.webhookReceiver.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.webhookReceiver.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.webhookReceiver.autoscaling.targetCPUUtilization }}
{{- end }}
