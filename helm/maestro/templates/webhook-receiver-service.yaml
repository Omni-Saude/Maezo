{{- if .Values.webhookReceiver.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maestro.fullname" . }}-webhook-receiver
  labels:
    {{- include "maestro.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-receiver
spec:
  type: ClusterIP
  ports:
    - port: 8090
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "maestro.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook-receiver
{{- end }}
