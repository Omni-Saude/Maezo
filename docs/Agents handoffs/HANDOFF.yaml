# CLAUDE-FLOW QUICK REFERENCE
# ══════════════════════════════════════════════════════════════════════════════
claude_flow:
  workflow: "See pattern-complete-swarm-workflow in memory (pre-task → spawn → post-task)"
  prompt_structure: "See pattern-prompt-structure-benchmark in memory (3-tier mandatory)"
  memory_store: "npx @claude-flow/cli@latest memory store --key \"{k}\" --value \"{v}\" --namespace healthcare-platform"
  memory_search: "npx @claude-flow/cli@latest memory search --query \"{q}\" --namespace healthcare-platform"
  memory_retrieve: "npx @claude-flow/cli@latest memory retrieve --key \"{k}\" --namespace healthcare-platform"
  swarm_spawn: "npx @claude-flow/cli@latest hive-mind spawn --workers {n} --topology hierarchical-mesh --consensus byzantine --claude --model-routing intelligent --namespace healthcare-platform --use-memory --objective \"{obj}\""

