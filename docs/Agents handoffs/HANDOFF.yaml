# COMMANDS
# ══════════════════════════════════════════════════════════════════════════════
commands:
  validate_bpmn: "xmllint --noout {file}"
  run_tests: "python3.11 -m pytest {path} -v"
  count_workers: "find healthcare_platform -name '*_worker*.py' | wc -l"
  count_dmn: "find healthcare_platform -name '*.dmn' | wc -l"
  detect_anti_patterns: "grep -rE 'def _[a-z_]{15,}|WEIGHT\\s*=|if.*elif.*elif' {worker_path}"
