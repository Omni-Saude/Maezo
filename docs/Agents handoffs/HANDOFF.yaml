# ══════════════════════════════════════════════════════════════════════════════
# CLAUDE-FLOW QUICK REFERENCE
# ══════════════════════════════════════════════════════════════════════════════
claude_flow:
  version: "v3.1.0-alpha.39"
  
  session_bootstrap:
    - "npx @claude-flow/cli@latest hive-mind init --topology hierarchical-mesh --consensus byzantine"
    - "npx @claude-flow/cli@latest memory init --force"
    - "npx @claude-flow/cli@latest hooks pretrain"
  
  swarm_spawn:
    command: "npx @claude-flow/cli@latest hive-mind spawn --workers {n} --topology hierarchical-mesh --consensus byzantine --claude --model-routing intelligent --namespace healthcare-platform --use-memory --use-patterns --use-vectors --use-learning --objective \"{obj}\""
    execution: "manual_copy_paste"  # npx heredoc escaping breaks
  
  memory:
    store: "npx @claude-flow/cli@latest memory store --key \"{k}\" --value \"{v}\" --namespace healthcare-platform"
    search: "npx @claude-flow/cli@latest memory search --query \"{q}\" --namespace healthcare-platform"
  
  verify:
    - "npx @claude-flow/cli@latest doctor --verbose"
    - "npx @claude-flow/cli@latest neural status"
    - "npx @claude-flow/cli@latest memory search --query \"test\" --namespace healthcare-platform"

# ══════════════════════════════════════════════════════════════════════════════
# COMMANDS
# ══════════════════════════════════════════════════════════════════════════════
commands:
  validate_bpmn: "xmllint --noout {file}"
  run_tests: "python3.11 -m pytest {path} -v"
  detect_anti_patterns: "grep -rE 'def _[a-z_]{15,}|WEIGHT\\s*=|if.*elif.*elif' {worker_path}"
  count_methods: "grep -c 'def ' {worker_file}"
  count_lines: "wc -l {worker_file}"
