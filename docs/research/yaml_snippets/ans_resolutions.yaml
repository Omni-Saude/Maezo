# ANS Normative Resolutions Snippet
# Copy this into business rules documentation for ANS compliance

ans_resolutions:
  authority: "ANS - Agência Nacional de Saúde Suplementar"
  reference_url: "https://www.ans.gov.br"

  RN_465_2021:
    title: "Rol de Procedimentos e Eventos em Saúde"
    effective_date: "2021-04-01"
    status: active
    category: coverage_requirements

    amendments:
      - resolution: RN_473_2021
        date: "2021"
        description: "Updates to procedure list"

      - resolution: RN_643_2025
        date: "2025"
        description: "Latest amendments to coverage requirements"

    scope:
      - "Mandatory coverage procedures and events"
      - "Healthcare services included in supplementary health plans"
      - "Minimum coverage requirements for all health plans"

    business_impact:
      - impact: procedure_authorization
        description: "Defines which procedures require automatic approval"

      - impact: claim_processing
        description: "Validates claims against covered procedures list"

      - impact: financial_planning
        description: "Impacts financial provisions for coverage obligations"

    compliance_requirements:
      - requirement: "Maintain updated procedure list from ANS"
        frequency: quarterly

      - requirement: "Validate all claims against Rol de Procedimentos"
        trigger: claim_submission

      - requirement: "Document any procedure denials with legal justification"
        audit: required

    validation_workflow:
      - step: 1
        action: "Download latest Rol de Procedimentos from ANS portal"
        source: "https://www.ans.gov.br/images/stories/Legislacao/rn/Anexo_I_Rol_2021RN_465.2021_RN643.2025.pdf"

      - step: 2
        action: "Import procedure codes into system database"
        format: structured_data

      - step: 3
        action: "Map TUSS codes to Rol procedures"
        validation: bidirectional_mapping

      - step: 4
        action: "Configure authorization rules"
        rules_engine: business_rules_catalog

      - step: 5
        action: "Test claims processing workflow"
        test_cases: covered_and_non_covered_procedures

  RN_395_2016:
    title: "Operational Standards for Supplementary Healthcare"
    status: active
    category: operational_requirements
    verification_required: true

    action_items:
      - action: "Access full resolution text"
        url: "https://www.ans.gov.br/component/legislacao/"
        search: "RN 395/2016"

      - action: "Extract compliance requirements"
        method: manual_review

      - action: "Map requirements to business rules"
        tool: business_rules_catalog

      - action: "Implement validation logic"
        location: services_layer

      - action: "Document in business rules"
        format: yaml_snippet

    note: "Direct verification from ANS portal required. This resolution contains operational standards that must be extracted and documented."

  RN_442_2018:
    title: "ANS Regulatory Standards"
    status: active
    category: regulatory_compliance
    verification_required: true

    action_items:
      - action: "Access full resolution text"
        url: "https://www.ans.gov.br/component/legislacao/"
        search: "RN 442/2018"

      - action: "Extract compliance requirements"
        method: manual_review

      - action: "Map requirements to business rules"
        tool: business_rules_catalog

      - action: "Implement validation logic"
        location: services_layer

      - action: "Document in business rules"
        format: yaml_snippet

    note: "Direct verification from ANS portal required. This resolution contains regulatory standards that must be extracted and documented."

  general_compliance_framework:
    data_submission:
      frequency: monthly
      format: TISS_XML
      validation: mandatory

    transparency:
      requirement: "Publish coverage information to beneficiaries"
      channels: ["website", "mobile_app", "printed_materials"]

    quality_indicators:
      monitoring: required
      reporting: quarterly
      indicators:
        - "Average claim processing time"
        - "Authorization approval rate"
        - "Glosa rate by reason"
        - "Beneficiary complaint rate"

    audit_cooperation:
      requirement: "Cooperate with ANS audits and inspections"
      documentation: "Maintain records for 5 years minimum"
      response_time: "15 business days for ANS requests"

  integration_points:
    tiss_4_0:
      relationship: "ANS resolutions define data that must be transmitted via TISS"
      compliance: "TISS format must include ANS-required fields"

    lgpd:
      relationship: "ANS data collection must respect LGPD principles"
      compliance: "Patient consent for data sharing with ANS"

    business_rules:
      relationship: "Business rules must enforce ANS resolution requirements"
      validation: "Automated validation against ANS standards"

  update_monitoring:
    process:
      - step: "Subscribe to ANS legislative updates"
        channel: "https://www.ans.gov.br/component/legislacao/"

      - step: "Review new resolutions monthly"
        responsibility: compliance_officer

      - step: "Impact analysis for new requirements"
        team: [compliance, development, business_analysis]

      - step: "Update business rules catalog"
        deadline: "30 days from publication"

      - step: "Implement system changes"
        methodology: agile_sprints

      - step: "Test compliance"
        validation: "Test environment before production"

      - step: "Deploy to production"
        approval: [compliance_officer, technical_lead]

      - step: "Document changes"
        location: business_rules_documentation
