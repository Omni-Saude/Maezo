# TISS 4.0 Validation Snippet
# Copy this into business rules documentation to ensure TISS compliance

tiss_4_0_compliance:
  version: "4.01"
  next_version: "September 2025"
  status: "mandatory"
  reference_url: "https://www.gov.br/ans/pt-br/assuntos/prestadores/padrao-para-troca-de-informacao-de-saude-suplementar-2013-tiss"

  mandatory_fields:
    - field: unidade_medida
      description: "Unit of measure"
      type: string
      validation: required

    - field: codigo_despesa
      description: "Expense code"
      type: string
      validation: required

    - field: data_realizacao
      description: "Execution date"
      type: date
      format: "ISO 8601"
      validation: required

    - field: quantidade
      description: "Quantity"
      type: number
      validation: required

    - field: codigo_item_assistencial
      description: "Healthcare item code (TUSS)"
      type: string
      validation: required

  components:
    organizacional:
      status: mandatory
      description: "Operational rules implementation"

    conteudo_estrutura:
      status: mandatory
      description: "Data architecture and XML schema"
      validation:
        - xml_schema_validation: true
        - data_structure_compliance: true

    tuss:
      status: mandatory
      description: "Unified terminology"
      terminologies:
        - name: OPME
          table: 19
          terms_count: 26000+
        - name: Medications
          table: 20
          terms_count: 334
        - name: Submission formats
          table: 64

    seguranca_privacidade:
      status: mandatory
      description: "Security and privacy requirements"
      lgpd_aligned: true
      requirements:
        - encryption_in_transit: required
        - encryption_at_rest: required
        - access_control: required
        - audit_trail: required

    comunicacao:
      status: mandatory
      description: "Electronic messaging"
      standards:
        - format: XML
        - specification: WSDL
        - transport: "Secure web services"
      communication_packages:
        - "04.02.00"
        - "01.05.00"
      testing_required: true

  validation_workflow:
    - step: 1
      action: "Validate XML against ANS XSD schemas"
      tool: "XML validator"

    - step: 2
      action: "Test communication packages in test environment"
      packages: ["04.02.00", "01.05.00"]

    - step: 3
      action: "Verify TUSS terminology mapping"
      tables: [19, 20, 64]

    - step: 4
      action: "Confirm LGPD security measures"
      requirements: ["encryption", "access_control", "audit"]

    - step: 5
      action: "Approve production rollout"
      approver: "Technical Lead + Compliance Officer"
