# LGPD Compliance Snippet
# Copy this into business rules documentation for data privacy compliance

lgpd_compliance:
  law: "Lei No 13.709/2018"
  authority: ANPD
  effective_date: "2020-09-18"
  reference_url: "http://www.planalto.gov.br/ccivil_03/_ato2015-2018/2018/lei/l13709.htm"

  sensitive_health_data:
    definition: "Personal data relating to health, sexual life, genetic or biometric data"
    classification: SENSITIVE
    protection_level: HIGH

    prohibitions:
      - action: "Communication or shared use for economic advantage"
        penalty: "Up to 2% revenue or R$ 50M"
        exception: "Legal obligations or public health emergencies"

  access_control:
    intra_institutional:
      rule: "Only individuals with professional secrecy obligations"
      conditions:
        - involved_in_patient_care: true
        - professional_secrecy_obligation: true
      audit_level: HIGH

    inter_institutional:
      rule: "Written patient consent REQUIRED"
      conditions:
        - patient_written_consent: required
        - justification: required
      exceptions:
        - "Legal obligations"
        - "Public health emergencies"
        - "Anonymized research data"
      audit_level: HIGH

  legal_basis:
    healthcare_processing:
      - "Protection of health"
      - "Proceedings by healthcare professionals"
      - "Proceedings by health entities"
      - "Public health activities"
      - "Scientific research (with Resolution 738/2025 safeguards)"

  patient_rights:
    - right: confirmation
      description: "Confirmation of data processing"

    - right: access
      description: "Access to personal data"

    - right: correction
      description: "Correction of incomplete/inaccurate data"

    - right: anonymization
      description: "Anonymization, blocking or deletion"

    - right: portability
      description: "Data portability to another provider"

    - right: deletion
      description: "Deletion of data processed with consent"

    - right: information
      description: "Information about data sharing"

    - right: revocation
      description: "Revocation of consent"

  penalties:
    warning:
      severity: low
      description: "Simple notice with remediation deadline"

    fine_simple:
      severity: medium
      max_amount: "R$ 50,000 per infraction"

    fine_daily:
      severity: high
      max_amount: "R$ 50,000 per day"

    fine_percentage:
      severity: critical
      calculation: "2% of revenue in Brazil"
      cap: "R$ 50,000,000"

    publicization:
      severity: high
      description: "Public disclosure of infraction"

    blocking:
      severity: critical
      description: "Blocking of personal data processing"

    deletion:
      severity: critical
      description: "Deletion of personal data"

  anpd_priorities_2025_2026:
    - priority: 1
      topic: "Data Protection Impact Assessments (DPIAs)"
      status: mandatory_for_high_risk

    - priority: 2
      topic: "Data sharing by government entities"
      impact: healthcare_institutions

    - priority: 3
      topic: "Minors' data processing"
      enhanced_protection: true

    - priority: 4
      topic: "Biometric data regulations"
      stricter_controls: true

    - priority: 5
      topic: "Security measures"
      technical_organizational: required

    - priority: 6
      topic: "Artificial Intelligence"
      transparency: required
      accountability: required

    - priority: 7
      topic: "High-risk processing"
      additional_safeguards: required

  recent_updates:
    - update: "Resolution 738/2025"
      date: "2025-01-21"
      description: "Regulates database use for scientific research"
      impact: research_institutions

    - update: "Supervision Priorities 2026-2027"
      date: "2025"
      description: "Topic map published for enforcement focus"
      impact: all_healthcare_entities

  compliance_checklist:
    data_mapping:
      - action: "Identify all health data processing activities"
      - action: "Map data flows (collection, storage, sharing, deletion)"
      - action: "Document legal basis for each processing activity"

    privacy_by_design:
      - action: "Implement data minimization"
      - action: "Apply pseudonymization where possible"
      - action: "Ensure anonymization for research data"

    security_measures:
      - action: "Encryption in transit (TLS 1.3+)"
      - action: "Encryption at rest (AES-256)"
      - action: "Multi-factor authentication"
      - action: "Role-based access control (RBAC)"
      - action: "Regular security audits"

    data_subject_rights:
      - action: "Implement request portal for patient rights"
      - action: "Define SLAs for rights requests (15 days)"
      - action: "Train staff on rights fulfillment"

    incident_response:
      - action: "Incident response plan documented"
      - action: "ANPD notification within 2 business days"
      - action: "Data subject notification when high risk"

    vendor_management:
      - action: "Data processing agreements with vendors"
      - action: "Vendor LGPD compliance verification"
      - action: "Liability clauses in contracts"

    training:
      - action: "Annual LGPD training for all staff"
      - action: "Specialized training for DPO and security team"
      - action: "Awareness campaigns for patients"

  dpo_requirements:
    appointment: required_for_large_scale_processing
    responsibilities:
      - "Accept complaints and communications from data subjects"
      - "Provide guidance to employees on data protection practices"
      - "Cooperate with ANPD and act as contact point"
      - "Monitor LGPD compliance"
    qualifications:
      - "Knowledge of data protection law and practices"
      - "Understanding of healthcare operations"
      - "Independence in performing duties"
