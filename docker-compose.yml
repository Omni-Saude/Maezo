##############################################################################
# Maestro Healthcare Platform - Local Development Environment
# Usage: docker compose up -d
# Requires: Docker Desktop with 8GB+ RAM allocated
##############################################################################

services:

  # ===========================================================================
  # DATA LAYER
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maestro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maestro_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cibseven}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maestro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: maestro-dev-cluster-001
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ===========================================================================
  # ORCHESTRATION LAYER - CIB Seven 2.1.3
  # ===========================================================================

  cib7-engine:
    image: cibseven/cibseven-bpm-platform:2.1.3
    ports:
      - "8080:8080"
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cibseven}
      DB_USERNAME: ${POSTGRES_USER:-maestro}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-maestro_dev}
      # Multi-tenancy
      CIBSEVEN_BPM_MULTITENANCY_ENABLED: "true"
      CIBSEVEN_BPM_DEFAULT_TENANT: austa-hospital
      # Job execution
      CIBSEVEN_BPM_JOB_EXECUTION_CORE_POOL_SIZE: "6"
      CIBSEVEN_BPM_JOB_EXECUTION_MAX_POOL_SIZE: "12"
      # External task
      CIBSEVEN_BPM_EXTERNAL_TASK_LOCK_DURATION: "300000"
      # History cleanup
      CIBSEVEN_BPM_HISTORY_CLEANUP_ENABLED: "true"
      CIBSEVEN_BPM_HISTORY_CLEANUP_BATCH_SIZE: "100"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/engine-rest/engine || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ===========================================================================
  # INTEGRATION LAYER
  # ===========================================================================

  hapi-fhir:
    image: hapiproject/hapi:v7.4.0
    ports:
      - "8082:8080"
    environment:
      spring.datasource.url: jdbc:postgresql://postgres:5432/hapi_fhir
      spring.datasource.username: ${POSTGRES_USER:-maestro}
      spring.datasource.password: ${POSTGRES_PASSWORD:-maestro_dev}
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.reuse_cached_search_results_millis: "60000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/fhir/metadata || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-maestro}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-maestro_dev}
    volumes:
      - ./config/keycloak/austa-bpm-realm.json:/opt/keycloak/data/import/austa-bpm-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\nHost: localhost\\n\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 15

  # ===========================================================================
  # PYTHON EXTERNAL TASK WORKERS (ADR-003)
  # ===========================================================================

  worker-billing:
    build: .
    command: ["--domain", "revenue_cycle"]
    environment:
      CIBSEVEN_ENGINE_URL: http://cib7-engine:8080/engine-rest
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      WORKER_ID: worker-billing
      HEALTH_PORT: "8000"
      WORKER_MAX_TASKS: "10"
      WORKER_LOCK_DURATION: "300000"
    depends_on:
      cib7-engine:
        condition: service_healthy
      hapi-fhir:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker-clinical:
    build: .
    command: ["--domain", "clinical_operations"]
    environment:
      CIBSEVEN_ENGINE_URL: http://cib7-engine:8080/engine-rest
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      WORKER_ID: worker-clinical
      HEALTH_PORT: "8000"
    depends_on:
      cib7-engine:
        condition: service_healthy
      hapi-fhir:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker-access:
    build: .
    command: ["--domain", "patient_access"]
    environment:
      CIBSEVEN_ENGINE_URL: http://cib7-engine:8080/engine-rest
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      WORKER_ID: worker-access
      HEALTH_PORT: "8000"
    depends_on:
      cib7-engine:
        condition: service_healthy
      hapi-fhir:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker-platform:
    build: .
    command: ["--domain", "platform_services"]
    environment:
      CIBSEVEN_ENGINE_URL: http://cib7-engine:8080/engine-rest
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      WORKER_ID: worker-platform
      HEALTH_PORT: "8000"
    depends_on:
      cib7-engine:
        condition: service_healthy
      hapi-fhir:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # OBSERVABILITY
  # ===========================================================================

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/observability/prometheus/rules.yml:/etc/prometheus/rules.yml:ro

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/observability/grafana/dashboard-cib7-workers.json:/var/lib/grafana/dashboards/cib7-workers.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  es_data:
  grafana_data:
